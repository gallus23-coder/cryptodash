<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #4ade80;
  --accent2: #60a5fa;
  --red: #f87171;
  --amber: #fbbf24;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

/* layout */
.shell { display: grid; grid-template-rows: 56px 40px 1fr; min-height: 100vh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--bg2); }
header h1 { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: 0.06em; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-family: var(--mono); }
.pill.live { background: rgba(74,222,128,0.12); color: var(--accent); border: 1px solid rgba(74,222,128,0.25); }
.pill.loading { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.pill.error { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.dot.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#updated { font-size: 11px; color: var(--muted); font-family: var(--mono); }

main { display: grid; grid-template-columns: 1fr 320px; overflow: hidden; height: calc(100vh - 96px); }
.left-panel { overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
.right-panel { border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--bg2); }

/* summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.stat { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
.stat-value { font-size: 22px; font-weight: 500; font-family: var(--mono); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

/* table */
.table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
.toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: var(--mono); }
.coin-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-family: var(--mono); transition: border-color 0.15s; }
.coin-tag:hover { border-color: var(--red); color: var(--red); }
.btn { font-size: 12px; padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: var(--mono); transition: background 0.15s; }
.btn:hover { background: var(--bg3); }
.btn.primary { border-color: rgba(74,222,128,0.4); color: var(--accent); }
.btn.primary:hover { background: rgba(74,222,128,0.08); }
.add-row { display: none; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--bg3); }
.add-row.open { display: flex; }
.add-row input { font-size: 12px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-family: var(--mono); outline: none; width: 160px; }
.add-row input:focus { border-color: var(--accent2); }
.hint { font-size: 11px; color: var(--muted); }
table { width: 100%; border-collapse: collapse; }
thead th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 8px 14px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; font-family: var(--mono); }
thead th:first-child { text-align: left; cursor: default; }
thead th:hover:not(:first-child) { color: var(--text); }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody td { padding: 10px 14px; text-align: right; font-family: var(--mono); font-size: 13px; white-space: nowrap; }
tbody td:first-child { text-align: left; }
.coin-cell { display: flex; align-items: center; gap: 10px; }
.coin-img { width: 28px; height: 28px; border-radius: 50%; object-fit: contain; background: var(--bg3); }
.coin-sym { font-weight: 500; font-size: 13px; }
.coin-name { font-size: 11px; color: var(--muted); margin-top: 1px; }
.up { color: #4ade80; }
.dn { color: #f87171; }
.pct { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.pct.up { background: rgba(74,222,128,0.1); color: #4ade80; }
.pct.dn { background: rgba(248,113,113,0.1); color: #f87171; }
.sort-arrow { color: var(--accent2); }

/* right panel */
.panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: var(--mono); }

/* alert form */
.alert-form { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.form-row { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-family: var(--mono); }
.form-input { font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-family: var(--mono); outline: none; width: 100%; }
.form-input:focus { border-color: var(--accent2); }
select.form-input { cursor: pointer; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn.full { width: 100%; justify-content: center; display: flex; }

/* alert list */
.alerts-list { display: flex; flex-direction: column; gap: 8px; }
.alert-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.alert-card.triggered { border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.05); }
.alert-top { display: flex; justify-content: space-between; align-items: flex-start; }
.alert-coin { font-family: var(--mono); font-weight: 500; font-size: 13px; }
.alert-actions { display: flex; gap: 4px; }
.icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 4px; font-size: 13px; border-radius: 4px; line-height: 1; }
.icon-btn:hover { color: var(--text); background: var(--bg); }
.alert-desc { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
.alert-label { font-size: 11px; color: var(--accent2); margin-top: 2px; }
.alert-status { font-size: 10px; margin-top: 6px; padding: 2px 6px; border-radius: 3px; display: inline-block; font-family: var(--mono); background: rgba(251,191,36,0.15); color: var(--amber); }
.empty-state { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 0; font-family: var(--mono); }
.loading-state { color: var(--muted); font-size: 13px; padding: 40px 0; text-align: center; }
.rsi-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 12px; font-family: var(--mono); }
.rsi-low { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.rsi-high { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.rsi-mid { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.signal-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--mono); cursor: default; white-space: nowrap; }
.signal-strong_buy  { background: rgba(74,222,128,0.20); color: #4ade80; border: 1px solid rgba(74,222,128,0.45); font-weight: 600; }
.signal-buy         { background: rgba(74,222,128,0.10); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
.signal-hold        { background: rgba(251,191,36,0.10); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
.signal-sell        { background: rgba(248,113,113,0.10); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
.signal-strong_sell { background: rgba(248,113,113,0.20); color: #f87171; border: 1px solid rgba(248,113,113,0.45); font-weight: 600; }
.signal-pending     { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.fng-bar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: 12px; color: var(--muted); }
.fng-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.fng-value { font-size: 14px; font-weight: 500; }
.summary-row td { background: var(--bg3); padding: 6px 14px 10px 14px; font-size: 11px; font-family: var(--sans); white-space: normal; border-bottom: 1px solid var(--border); }
.summary-row.sig-strong_buy  td { border-left: 3px solid #22c55e; color: #22c55e; }
.summary-row.sig-buy         td { border-left: 3px solid #4ade80; color: #4ade80; }
.summary-row.sig-hold        td { border-left: 3px solid #fbbf24; color: #fbbf24; }
.summary-row.sig-sell        td { border-left: 3px solid #f87171; color: #f87171; }
.summary-row.sig-strong_sell td { border-left: 3px solid #ef4444; color: #ef4444; }
tbody tr.has-summary { border-bottom: none; }

/* tab bar */
.tab-bar { display: flex; align-items: center; gap: 2px; padding: 0 24px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; padding: 0 14px; height: 40px; text-transform: uppercase; transition: color 0.15s, border-color 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* opportunities panel */
.opp-panel { height: calc(100vh - 96px); overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.opp-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.opp-title { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.opp-meta { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.hero-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; max-width: 860px; }
.hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.tier-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 4px; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; }
.tier-new-riser { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.4); }
.tier-dip { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
.hero-sym { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--text); }
.hero-name { font-size: 13px; color: var(--muted); font-family: var(--sans); margin-top: 2px; }
.hero-price { font-family: var(--mono); font-size: 22px; font-weight: 500; }
.hero-change { display: inline-block; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 13px; margin-left: 8px; }
.hero-relstr { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--sans); }
.hero-relstr .up { color: #4ade80; font-weight: 500; }
.hero-relstr .dn { color: #f87171; font-weight: 500; }
.score-row { display: flex; align-items: center; gap: 12px; }
.score-label { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
.score-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: var(--bg3); flex: 1; }
.score-seg { height: 100%; transition: flex 0.3s; }
.seg-recency    { background: #4ade80; }
.seg-volume     { background: #60a5fa; }
.seg-macd       { background: #fbbf24; }
.seg-rs         { background: #a78bfa; }
.seg-rsi        { background: #4ade80; }
.seg-ema50      { background: #60a5fa; }
.seg-empty      { background: transparent; }
.score-legend { display: flex; gap: 10px; flex-wrap: wrap; font-family: var(--mono); font-size: 10px; color: var(--muted); }
.score-legend span::before { content: '■ '; }
.score-legend .l-recency::before    { color: #4ade80; }
.score-legend .l-volume::before     { color: #60a5fa; }
.score-legend .l-macd::before       { color: #fbbf24; }
.score-legend .l-rs::before         { color: #a78bfa; }
.score-legend .l-rsi::before        { color: #4ade80; }
.score-legend .l-ema50::before      { color: #60a5fa; }
.hero-signal-row { display: flex; align-items: center; gap: 12px; }
.hero-signal-badge { padding: 5px 14px; font-size: 13px; }
.hero-summary { font-size: 13px; color: var(--muted); font-family: var(--sans); line-height: 1.5; }
.hero-stats { display: flex; gap: 20px; flex-wrap: wrap; font-family: var(--mono); font-size: 12px; color: var(--muted); }
.hero-stats span strong { color: var(--text); }
.hero-add { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
.hero-add input { font-size: 12px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-family: var(--mono); outline: none; width: 180px; }
.hero-add input:focus { border-color: var(--accent2); }
.also-section { max-width: 860px; }
.also-section details { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.also-section summary { padding: 10px 16px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
.also-section summary::-webkit-details-marker { display: none; }
.also-section summary::after { content: '▸'; font-size: 10px; transition: transform 0.15s; }
.also-section details[open] summary::after { transform: rotate(90deg); }
.also-inner { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 6px; }
.also-subsection { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 8px; margin-bottom: 4px; }
.also-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-family: var(--mono); font-size: 12px; }
.also-sym { font-weight: 500; color: var(--text); min-width: 100px; }
.also-score { color: var(--muted); }
.empty-opp { max-width: 860px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; color: var(--muted); font-size: 13px; font-family: var(--sans); line-height: 1.6; }
.disclaimer { max-width: 860px; font-size: 11px; color: var(--muted); font-family: var(--sans); line-height: 1.5; opacity: 0.7; border-top: 1px solid var(--border); padding-top: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
.btn.scan-done { border-color: rgba(74,222,128,0.4); color: var(--accent); }
.empty-opp-styled { max-width: 860px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 32px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
.empty-opp-icon { font-size: 48px; color: var(--muted); opacity: 0.4; line-height: 1; }
.empty-opp-heading { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--muted); }
.empty-opp-sub { font-family: var(--sans); font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 520px; opacity: 0.8; }
.empty-opp-time { font-family: var(--mono); font-size: 11px; color: var(--muted); opacity: 0.5; margin-top: 4px; }

/* backtest panel */
.bt-panel { height: calc(100vh - 96px); overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.bt-controls { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.bt-control-group { display: flex; flex-direction: column; gap: 4px; }
.bt-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-family: var(--mono); }
.bt-checkboxes { display: flex; gap: 10px; align-items: center; height: 31px; }
.bt-checkboxes label { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 12px; color: var(--text); cursor: pointer; }
.bt-checkboxes input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
.bt-progress-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
.bt-progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bt-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; width: 0%; }
.bt-progress-msg { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.bt-phase-banner { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-left: 3px solid; background: var(--bg2); border-radius: var(--radius); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; max-width: 860px; }
.bt-phase-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); white-space: nowrap; }
.bt-sim-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; max-width: 860px; }
.bt-sim-header { display: flex; align-items: center; justify-content: space-between; }
.bt-sim-title { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.bt-sim-period { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.bt-sim-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.bt-sim-col { display: flex; flex-direction: column; gap: 2px; }
.bt-sim-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
.bt-sim-big { font-family: var(--mono); font-size: 28px; font-weight: 500; }
.bt-sim-sub { font-family: var(--mono); font-size: 13px; }
.bt-sim-stats { display: flex; gap: 18px; flex-wrap: wrap; font-family: var(--mono); font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
.bt-sim-stats strong { color: var(--text); }
.bt-coins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; max-width: 860px; }
.bt-coin-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.bt-coin-header { display: flex; align-items: center; justify-content: space-between; }
.bt-coin-sym { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); text-transform: uppercase; }
.bt-coin-window { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.bt-coin-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.bt-stat-item { display: flex; flex-direction: column; gap: 1px; }
.bt-stat-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.bt-stat-val { font-family: var(--mono); font-size: 13px; color: var(--text); }
.bt-phase-split { display: flex; gap: 12px; font-family: var(--mono); font-size: 11px; border-top: 1px solid var(--border); padding-top: 6px; }
.bt-curve-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; max-width: 860px; }
.bt-curve-title { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.bt-curve { width: 100%; height: 180px; display: block; }
.bt-curve-legend { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>// crypto dashboard</h1>
    <div class="header-right">
      <span id="status-pill" class="pill loading"><span class="dot"></span> Loading</span>
      <span id="updated">—</span>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab active" onclick="switchTab('watchlist')">Watchlist</button>
    <button class="tab" onclick="switchTab('opportunities')">Opportunities</button>
    <button class="tab" onclick="switchTab('backtest')">Backtest</button>
  </nav>

  <div id="tab-watchlist" class="tab-content active">
  <main>
    <!-- left: market data -->
    <div class="left-panel">
      <div class="fng-bar" id="fng-bar">
        <span class="fng-label">Fear &amp; Greed</span>
        <span class="fng-value" id="fng-value">—</span>
        <span id="fng-class" style="color:var(--muted)"></span>
      </div>

      <div class="summary-grid" id="summary-grid">
        <div class="stat"><div class="stat-label">Tracked</div><div class="stat-value" id="s-count">—</div></div>
        <div class="stat"><div class="stat-label">Gainers</div><div class="stat-value up" id="s-gainers">—</div></div>
        <div class="stat"><div class="stat-label">Losers</div><div class="stat-value dn" id="s-losers">—</div></div>
        <div class="stat"><div class="stat-label">Best 24h</div><div class="stat-value up" id="s-best">—</div><div class="stat-sub" id="s-best-coin"></div></div>
        <div class="stat"><div class="stat-label">Worst 24h</div><div class="stat-value dn" id="s-worst">—</div><div class="stat-sub" id="s-worst-coin"></div></div>
      </div>

      <div class="table-card">
        <div class="table-toolbar">
          <div class="toolbar-left">
            <span class="section-title">Watchlist</span>
            <div id="coin-tags"></div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn primary" onclick="toggleAdd()">+ Add coin</button>
            <button class="btn" onclick="loadMarket()">↺ Refresh</button>
          </div>
        </div>
        <div class="add-row" id="add-row">
          <input id="add-input" placeholder="e.g. polkadot, chainlink…" />
          <button class="btn primary" onclick="addCoin()">Add</button>
          <button class="btn" onclick="toggleAdd()">Cancel</button>
          <span class="hint">Use CoinGecko coin ID</span>
        </div>
        <div id="table-wrap">
          <div class="loading-state">Fetching market data…</div>
        </div>
      </div>
    </div>

    <!-- right: alerts -->
    <div class="right-panel">
      <div class="panel-title">Price Alerts</div>

      <div class="alert-form">
        <div class="form-row">
          <label class="form-label">Coin (CoinGecko ID)</label>
          <input class="form-input" id="al-coin" placeholder="e.g. bitcoin" />
        </div>
        <div class="form-row-2">
          <div class="form-row">
            <label class="form-label">Condition</label>
            <select class="form-input" id="al-cond">
              <option value="above">Price above</option>
              <option value="below">Price below</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">Target (USD)</label>
            <input class="form-input" id="al-price" type="number" placeholder="e.g. 70000" />
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">Label (optional)</label>
          <input class="form-input" id="al-label" placeholder="e.g. BTC ATH target" />
        </div>
        <button class="btn primary full" onclick="addAlert()">Set Alert</button>
      </div>

      <div class="panel-title" style="margin-top:4px">Active Alerts</div>
      <div class="alerts-list" id="alerts-list">
        <div class="empty-state">No alerts set</div>
      </div>
    </div>
  </main>
  </div><!-- /tab-watchlist -->

  <div id="tab-opp" class="tab-content">
    <div class="opp-panel">
      <div class="opp-header">
        <span class="opp-title">// opportunities</span>
        <div class="opp-meta">
          <span id="scan-time">—</span>
          <span>·</span>
          <span>Next scan <span id="scan-countdown">—</span></span>
          <button class="btn primary" id="scan-now-btn" onclick="triggerScan()">Scan Now</button>
        </div>
      </div>
      <div id="opp-content">
        <div class="loading-state">Loading scanner…</div>
      </div>
    </div>
  </div><!-- /tab-opp -->

  <div id="tab-backtest" class="tab-content">
    <div class="bt-panel">
      <div class="bt-controls">
        <div class="bt-control-group">
          <label class="bt-label">Coin</label>
          <select class="form-input" id="bt-coin" style="width:160px">
            <option value="all">All Coins</option>
          </select>
        </div>
        <div class="bt-control-group">
          <label class="bt-label">Period</label>
          <select class="form-input" id="bt-days" style="width:110px">
            <option value="30">30 days</option>
            <option value="60">60 days</option>
            <option value="90" selected>90 days</option>
          </select>
        </div>
        <div class="bt-control-group">
          <label class="bt-label">Forward Windows</label>
          <div class="bt-checkboxes">
            <label><input type="checkbox" id="bt-fw4" value="4" checked> 4h</label>
            <label><input type="checkbox" id="bt-fw24" value="24" checked> 24h</label>
            <label><input type="checkbox" id="bt-fw72" value="72" checked> 72h</label>
          </div>
        </div>
        <button class="btn primary" id="bt-run-btn" onclick="runBacktestNow()">Run Backtest</button>
      </div>
      <div class="bt-progress-wrap" id="bt-progress-wrap" style="display:none">
        <div class="bt-progress-bar"><div class="bt-progress-fill" id="bt-progress-fill"></div></div>
        <div class="bt-progress-msg" id="bt-progress-msg">Starting…</div>
      </div>
      <div id="bt-content">
        <div class="loading-state">Run a backtest to see results.</div>
      </div>
    </div>
  </div><!-- /tab-backtest -->

</div>

<script>
let marketData = [];
let rsiData = {};
let signalData = {};
let fearGreedData = {};
let scannerData = null;
let sortCol = 'market_cap', sortDir = -1;

// ── formatting ────────────────────────────────────────────────────────────────
function fmtPrice(n) {
  if (n == null) return '—';
  if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (n >= 1) return '$' + n.toFixed(2);
  if (n >= 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(6);
}
function fmtBig(n) {
  if (n == null) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  return '$' + n.toLocaleString();
}
function fmtPct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function spark(prices) {
  if (!prices || prices.length < 2) return '';
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const w = 64, h = 26;
  const pts = prices.map((p, i) =>
    `${((i / (prices.length-1)) * w).toFixed(1)},${(h - ((p-min)/range)*h).toFixed(1)}`
  ).join(' ');
  const up = prices[prices.length-1] >= prices[0];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${up?'#4ade80':'#f87171'}" stroke-width="1.5"/></svg>`;
}

// ── Fear & Greed ──────────────────────────────────────────────────────────────
async function loadFearGreed() {
  try {
    const r = await fetch('/api/feargreed');
    fearGreedData = r.ok ? await r.json() : {};
    const el = document.getElementById('fng-value');
    const cls = document.getElementById('fng-class');
    if (fearGreedData.value == null) {
      el.textContent = '—';
      el.style.color = 'var(--muted)';
      cls.textContent = '';
      return;
    }
    const v = fearGreedData.value;
    const color = v < 25 ? 'var(--red)'
      : v < 50 ? 'var(--amber)'
      : v < 75 ? 'var(--accent)'
      : '#a78bfa';
    el.textContent = v;
    el.style.color = color;
    cls.textContent = '— ' + fearGreedData.classification;
    cls.style.color = color;
  } catch (e) {
    // silently leave existing display
  }
}

// ── status pill ───────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const el = document.getElementById('status-pill');
  el.className = 'pill ' + state;
  const dot = state === 'live' ? '<span class="dot pulse"></span>' : '<span class="dot"></span>';
  el.innerHTML = `${dot} ${text}`;
}

// ── market data ───────────────────────────────────────────────────────────────
async function loadMarket() {
  setStatus('loading', 'Loading');
  try {
    const [r, rr, sr] = await Promise.all([fetch('/api/market'), fetch('/api/rsi'), fetch('/api/signals')]);
    if (!r.ok) throw new Error(await r.text());
    marketData = await r.json();
    rsiData = rr.ok ? await rr.json() : {};
    signalData = sr.ok ? await sr.json() : {};
    renderTable();
    updateSummary();
    setStatus('live', 'Live');
    document.getElementById('updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    setStatus('error', 'Error');
    document.getElementById('table-wrap').innerHTML =
      `<div class="loading-state" style="color:#f87171">⚠ ${e.message}</div>`;
  }
}

function updateSummary() {
  const g = marketData.filter(d => d.price_change_percentage_24h > 0);
  const l = marketData.filter(d => d.price_change_percentage_24h < 0);
  const sorted = [...marketData].sort((a,b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
  document.getElementById('s-count').textContent = marketData.length;
  document.getElementById('s-gainers').textContent = g.length;
  document.getElementById('s-losers').textContent = l.length;
  if (sorted.length) {
    document.getElementById('s-best').textContent = fmtPct(sorted[0].price_change_percentage_24h);
    document.getElementById('s-best-coin').textContent = sorted[0].symbol.toUpperCase();
    document.getElementById('s-worst').textContent = fmtPct(sorted[sorted.length-1].price_change_percentage_24h);
    document.getElementById('s-worst-coin').textContent = sorted[sorted.length-1].symbol.toUpperCase();
  }
}

function renderTable() {
  const data = [...marketData].sort((a, b) => {
    const av = a[sortCol] ?? -Infinity, bv = b[sortCol] ?? -Infinity;
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });

  const cols = [
    { key: null, label: 'Asset' },
    { key: 'current_price', label: 'Price' },
    { key: 'price_change_percentage_1h_in_currency', label: '1h' },
    { key: 'price_change_percentage_24h', label: '24h' },
    { key: 'price_change_percentage_7d_in_currency', label: '7d' },
    { key: 'market_cap', label: 'Mkt Cap' },
    { key: 'total_volume', label: 'Vol 24h' },
    { key: null, label: '7d Chart' },
    { key: null, label: 'RSI 14' },
    { key: null, label: 'Signal' },
  ];

  const thArrow = key => key === sortCol ? `<span class="sort-arrow">${sortDir>0?'↑':'↓'}</span>` : '';
  const th = c => c.key
    ? `<th onclick="doSort('${c.key}')">${c.label} ${thArrow(c.key)}</th>`
    : `<th style="cursor:default">${c.label}</th>`;

  let rows = '';
  for (const row of data) {
    const p24 = row.price_change_percentage_24h;
    const p1h = row.price_change_percentage_1h_in_currency;
    const p7d = row.price_change_percentage_7d_in_currency;
    const sp = row.sparkline_in_7d ? spark(row.sparkline_in_7d.price) : '';
    const rsiEntry = rsiData[row.id];
    const rsiVal = rsiEntry ? rsiEntry.rsi : null;
    const rsiClass = rsiVal == null ? '' : rsiVal < 30 ? 'rsi-low' : rsiVal > 70 ? 'rsi-high' : 'rsi-mid';
    const rsiText = rsiVal == null ? '<span style="color:var(--muted)">—</span>' :
      `<span class="rsi-badge ${rsiClass}">${rsiVal.toFixed(1)}</span>`;
    const sigEntry = signalData[row.id];
    const VALID_SIGNALS = ['strong_buy', 'buy', 'hold', 'sell', 'strong_sell'];
    const SIGNAL_LABELS = { strong_buy: 'STRONG BUY', buy: 'BUY', hold: 'HOLD', sell: 'SELL', strong_sell: 'STRONG SELL' };
    const validSignal = sigEntry && VALID_SIGNALS.includes(sigEntry.signal) ? sigEntry.signal : null;
    const safeSummary = (sigEntry?.summary || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const sigHtml = validSignal
      ? `<span class="signal-badge signal-${validSignal}" title="${safeSummary}">${SIGNAL_LABELS[validSignal]}</span>`
      : `<span class="signal-badge signal-pending">Pending</span>`;
    const hasSummary = validSignal && safeSummary;
    const summaryRow = hasSummary
      ? `<tr class="summary-row sig-${validSignal}"><td colspan="10">${safeSummary}</td></tr>`
      : '';
    rows += `<tr${hasSummary ? ' class="has-summary"' : ''}>
      <td><div class="coin-cell">
        <img class="coin-img" src="${row.image}" alt="${row.name}" loading="lazy" />
        <div>
          <div class="coin-sym">${row.symbol.toUpperCase()}</div>
          <div class="coin-name">${row.name}</div>
        </div>
      </div></td>
      <td>${fmtPrice(row.current_price)}</td>
      <td><span class="pct ${p1h>=0?'up':'dn'}">${fmtPct(p1h)}</span></td>
      <td><span class="pct ${p24>=0?'up':'dn'}">${fmtPct(p24)}</span></td>
      <td><span class="pct ${p7d>=0?'up':'dn'}">${fmtPct(p7d)}</span></td>
      <td>${fmtBig(row.market_cap)}</td>
      <td>${fmtBig(row.total_volume)}</td>
      <td>${sp}</td>
      <td>${rsiText}</td>
      <td>${sigHtml}</td>
    </tr>${summaryRow}`;
  }

  document.getElementById('table-wrap').innerHTML =
    `<table><thead><tr>${cols.map(th).join('')}</tr></thead><tbody>${rows}</tbody></table>`;

  renderTags();
}

function doSort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  renderTable();
}

// ── watchlist tags ────────────────────────────────────────────────────────────
async function loadWatchlist() {
  const r = await fetch('/api/watchlist');
  return (await r.json()).coins || [];
}

function renderTags() {
  const coins = marketData.map(d => d.id);
  document.getElementById('coin-tags').innerHTML = coins.map(c =>
    `<span class="coin-tag" title="Click to remove" onclick="removeCoin('${c}')">${c} ×</span>`
  ).join('');
}

async function removeCoin(id) {
  await fetch(`/api/watchlist/${id}`, { method: 'DELETE' });
  await loadMarket();
}

function toggleAdd() {
  const row = document.getElementById('add-row');
  row.classList.toggle('open');
  if (row.classList.contains('open')) document.getElementById('add-input').focus();
}

async function addCoin() {
  const val = document.getElementById('add-input').value.trim().toLowerCase();
  if (!val) return;
  await fetch('/api/watchlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ coin: val })
  });
  document.getElementById('add-input').value = '';
  toggleAdd();
  await loadMarket();
}
document.getElementById('add-input').addEventListener('keydown', e => { if (e.key === 'Enter') addCoin(); });

// ── alerts ────────────────────────────────────────────────────────────────────
async function loadAlerts() {
  const r = await fetch('/api/alerts');
  const { alerts } = await r.json();
  renderAlerts(alerts);
}

function renderAlerts(alerts) {
  const list = document.getElementById('alerts-list');
  if (!alerts.length) {
    list.innerHTML = '<div class="empty-state">No alerts set</div>';
    return;
  }
  list.innerHTML = alerts.map(a => {
    const triggered = !a.active;
    return `<div class="alert-card ${triggered ? 'triggered' : ''}">
      <div class="alert-top">
        <span class="alert-coin">${a.coin.toUpperCase()}</span>
        <div class="alert-actions">
          ${triggered ? `<button class="icon-btn" title="Re-arm" onclick="resetAlert('${a.id}')">↺</button>` : ''}
          <button class="icon-btn" title="Delete" onclick="deleteAlert('${a.id}')">✕</button>
        </div>
      </div>
      ${a.label ? `<div class="alert-label">${a.label}</div>` : ''}
      <div class="alert-desc">Price ${a.condition} $${Number(a.price).toLocaleString()}</div>
      ${triggered ? '<span class="alert-status">Triggered</span>' : ''}
    </div>`;
  }).join('');
}

async function addAlert() {
  const coin = document.getElementById('al-coin').value.trim().toLowerCase();
  const condition = document.getElementById('al-cond').value;
  const price = parseFloat(document.getElementById('al-price').value);
  const label = document.getElementById('al-label').value.trim();
  if (!coin || !price) return alert('Coin and price are required.');
  await fetch('/api/alerts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ coin, condition, price, label })
  });
  document.getElementById('al-coin').value = '';
  document.getElementById('al-price').value = '';
  document.getElementById('al-label').value = '';
  loadAlerts();
}

async function deleteAlert(id) {
  await fetch(`/api/alerts/${id}`, { method: 'DELETE' });
  loadAlerts();
}

async function resetAlert(id) {
  await fetch(`/api/alerts/${id}/reset`, { method: 'PATCH' });
  loadAlerts();
}

// ── tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'opportunities' && !scannerData) loadScanner();
  if (name === 'backtest') { populateBtCoinDropdown(); if (!backtestData) loadBacktest(); }
}

// ── scanner ───────────────────────────────────────────────────────────────────
const SIGNAL_COLORS = {
  strong_buy: '#22c55e', buy: '#4ade80', hold: '#fbbf24',
  sell: '#f87171', strong_sell: '#ef4444',
};
const SIGNAL_LABELS = { strong_buy: 'STRONG BUY', buy: 'BUY', hold: 'HOLD', sell: 'SELL', strong_sell: 'STRONG SELL' };

function fmtRelStrength(rs) {
  if (rs == null) return '—';
  const abs = Math.abs(rs).toFixed(2);
  const cls = rs >= 0 ? 'up' : 'dn';
  const dir = rs >= 0 ? 'Outperforming BTC by' : 'Underperforming BTC by';
  return `<span class="${cls}">${dir} ${rs >= 0 ? '+' : '-'}${abs}%</span>`;
}

function buildScoreBar(winner) {
  if (!winner || !winner.scoreBreakdown) return '';
  const sb = winner.scoreBreakdown;
  const empty = Math.max(0, 100 - winner.score);
  let segs = '', legend = '';
  if (winner.tier === 0) {
    segs = `
      <div class="score-seg seg-recency"    style="flex:${sb.recency}"    title="Recency: ${sb.recency}/25"></div>
      <div class="score-seg seg-volume"     style="flex:${sb.volume}"     title="Volume: ${sb.volume}/25"></div>
      <div class="score-seg seg-macd"       style="flex:${sb.macd}"       title="MACD: ${sb.macd}/25"></div>
      <div class="score-seg seg-rs"         style="flex:${sb.relStrength}" title="Rel. Strength: ${sb.relStrength}/25"></div>
      <div class="score-seg seg-empty"      style="flex:${empty}"></div>`;
    legend = `<span class="l-recency">Recency ${sb.recency}</span>
      <span class="l-volume">Volume ${sb.volume}</span>
      <span class="l-macd">MACD ${sb.macd}</span>
      <span class="l-rs">Rel. Strength ${sb.relStrength}</span>`;
  } else {
    segs = `
      <div class="score-seg seg-rsi"   style="flex:${sb.rsi}"   title="RSI proximity: ${sb.rsi}/40"></div>
      <div class="score-seg seg-ema50" style="flex:${sb.ema50}" title="EMA50 proximity: ${sb.ema50}/30"></div>
      <div class="score-seg seg-macd"  style="flex:${sb.macd}"  title="MACD strength: ${sb.macd}/30"></div>
      <div class="score-seg seg-empty" style="flex:${empty}"></div>`;
    legend = `<span class="l-rsi">RSI ${sb.rsi}</span>
      <span class="l-ema50">EMA50 dist ${sb.ema50}</span>
      <span class="l-macd">MACD ${sb.macd}</span>`;
  }
  return `
    <div class="score-row">
      <span class="score-label">Score ${winner.score}/100</span>
      <div class="score-bar">${segs}</div>
    </div>
    <div class="score-legend">${legend}</div>`;
}

function renderOpportunities() {
  const el = document.getElementById('opp-content');
  if (!scannerData) { el.innerHTML = '<div class="loading-state">Loading scanner…</div>'; return; }

  const { latest, updatedAt } = scannerData;

  // update header meta
  document.getElementById('scan-time').textContent =
    updatedAt ? 'Last scan ' + new Date(updatedAt).toLocaleTimeString() : '—';

  if (!latest || !latest.winner) {
    const lastTs = latest && latest.timestamp
      ? 'Last scan ' + new Date(latest.timestamp).toLocaleString()
      : updatedAt ? 'Last scan ' + new Date(updatedAt).toLocaleString() : '';
    el.innerHTML = `
      <div class="empty-opp-styled">
        <div class="empty-opp-icon">🔭</div>
        <div class="empty-opp-heading">No Opportunities Found</div>
        <div class="empty-opp-sub">Neither Tier 0 nor Tier C criteria are currently met across the top 100 coins. This typically occurs in bearish or extended markets — the filters are working correctly.</div>
        ${lastTs ? `<div class="empty-opp-time">${lastTs}</div>` : ''}
      </div>
      <div class="disclaimer" style="margin-top:16px">
        Tier 0 identifies early trend transitions. Tier C identifies dips within established uptrends.
        These are algorithmic signals only and not financial advice. Always do your own research before trading.
      </div>`;
    return;
  }

  const w = latest.winner;
  const sym = w.symbol.replace('USDT', '');
  const isT0 = w.tier === 0;

  const tierBadge = isT0
    ? `<span class="tier-badge tier-new-riser">★ NEW RISER</span>`
    : `<span class="tier-badge tier-dip">● DIP IN UPTREND</span>`;

  const priceClass = w.change24h >= 0 ? 'up' : 'dn';
  const changePct  = (w.change24h >= 0 ? '+' : '') + w.change24h.toFixed(2) + '%';

  const sigBadge = w.signal
    ? `<span class="signal-badge signal-${w.signal} hero-signal-badge">${SIGNAL_LABELS[w.signal] || w.signal.toUpperCase()}</span>`
    : `<span class="signal-badge signal-pending hero-signal-badge">Pending</span>`;

  const scoreBar = buildScoreBar(w);
  const relStr   = fmtRelStrength(w.relStrength);

  const statsItems = [
    w.rsi != null        ? `<span>RSI <strong>${w.rsi.toFixed(1)}</strong></span>` : '',
    w.macd               ? `<span>MACD <strong>${w.macd.macd >= 0 ? '+' : ''}${w.macd.macd.toFixed(4)}</strong></span>` : '',
    w.distFromEMA50Pct != null ? `<span>EMA50 dist <strong>${w.distFromEMA50Pct.toFixed(1)}%</strong></span>` : '',
    w.volRatio != null   ? `<span>Vol ratio <strong>${w.volRatio.toFixed(2)}x</strong></span>` : '',
    isT0 && w.ema200CrossoverAgo != null ? `<span>200 EMA crossed <strong>${w.ema200CrossoverAgo}h ago</strong></span>` : '',
  ].filter(Boolean).join('');

  // also-qualified subsections
  const makeAlsoRows = (list) => list.map(c => {
    const csym = c.symbol.replace('USDT', '');
    const tbadge = c.tier === 0
      ? `<span class="tier-badge tier-new-riser" style="font-size:9px;padding:2px 6px">T0</span>`
      : `<span class="tier-badge tier-dip" style="font-size:9px;padding:2px 6px">TC</span>`;
    return `<div class="also-row">${tbadge}<span class="also-sym">${csym}</span><span class="also-score">${c.score}/100</span></div>`;
  }).join('');

  const t0Others = latest.otherTier0 || [];
  const tcOthers = latest.otherTierC || [];
  const hasOthers = t0Others.length > 0 || tcOthers.length > 0;

  const alsoSection = hasOthers ? `
    <div class="also-section">
      <details>
        <summary>Also qualified (${t0Others.length + tcOthers.length})</summary>
        <div class="also-inner">
          ${t0Others.length ? `<div class="also-subsection">Other Tier 0</div>${makeAlsoRows(t0Others)}` : ''}
          ${tcOthers.length ? `<div class="also-subsection">Other Tier C</div>${makeAlsoRows(tcOthers)}` : ''}
        </div>
      </details>
    </div>` : '';

  const scanTs = latest.timestamp
    ? `<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${new Date(latest.timestamp).toLocaleString()}</span>`
    : '';

  el.innerHTML = `
    <div class="hero-card">
      <div class="hero-top">
        <div>
          ${tierBadge}
          <div style="margin-top:10px">
            <span class="hero-sym">${sym}</span>
            <span class="hero-change pct ${priceClass}">${changePct}</span>
          </div>
          <div class="hero-price">${fmtPrice(w.price)}</div>
          <div class="hero-relstr">${relStr}</div>
        </div>
        ${scanTs}
      </div>
      ${scoreBar}
      <div class="hero-signal-row">
        ${sigBadge}
        ${w.signalSummary ? `<span class="hero-summary">${w.signalSummary.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>` : ''}
      </div>
      <div class="hero-stats">${statsItems}</div>
      <div class="hero-add">
        <input id="opp-add-input" value="${sym.toLowerCase()}" placeholder="CoinGecko ID" />
        <button class="btn primary" onclick="addFromScanner()">Add to Watchlist</button>
      </div>
    </div>
    ${alsoSection}
    <div class="disclaimer">
      Tier 0 identifies early trend transitions. Tier C identifies dips within established uptrends.
      These are algorithmic signals only and not financial advice. Always do your own research before trading.
    </div>`;
}

async function loadScanner() {
  try {
    const r = await fetch('/api/scanner');
    scannerData = r.ok ? await r.json() : null;
    renderOpportunities();
  } catch (_) {}
}

async function triggerScan() {
  const btn = document.getElementById('scan-now-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Scanning…';
  try {
    const r = await fetch('/api/scanner/run', { method: 'POST' });
    scannerData = r.ok ? await r.json() : scannerData;
    renderOpportunities();
    btn.innerHTML = '✓ Scan complete';
    btn.classList.remove('primary');
    btn.classList.add('scan-done');
    setTimeout(() => {
      btn.innerHTML = 'Scan Now';
      btn.classList.add('primary');
      btn.classList.remove('scan-done');
      btn.disabled = false;
    }, 2000);
  } catch (_) {
    btn.innerHTML = 'Scan Now';
    btn.disabled = false;
  }
}

async function addFromScanner() {
  const val = document.getElementById('opp-add-input').value.trim().toLowerCase();
  if (!val) return;
  await fetch('/api/watchlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ coin: val }),
  });
  alert(`Added ${val} to watchlist.`);
}

function updateCountdown() {
  const el = document.getElementById('scan-countdown');
  if (!el) return;
  const nextAt = ((scannerData && scannerData.updatedAt) || 0) + 3600000;
  const remaining = nextAt - Date.now();
  if (remaining <= 0) { el.textContent = 'soon'; return; }
  const m = Math.floor(remaining / 60000);
  const s = Math.floor((remaining % 60000) / 1000);
  el.textContent = `${m}m ${s}s`;
}

// ── backtest ──────────────────────────────────────────────────────────────────
let backtestData = null;
let btPollInterval = null;

function populateBtCoinDropdown() {
  const sel = document.getElementById('bt-coin');
  if (!sel) return;
  const current = sel.value;
  const coins = marketData.map(d => d.id);
  sel.innerHTML = `<option value="all">All Coins</option>` +
    coins.map(id => `<option value="${id}"${id === current ? ' selected' : ''}>${id}</option>`).join('');
}

async function loadBacktest() {
  try {
    const r = await fetch('/api/backtest/results');
    if (r.ok) { backtestData = await r.json(); renderBacktest(); }
  } catch (_) {}
}

async function runBacktestNow() {
  const btn = document.getElementById('bt-run-btn');
  const coinVal = document.getElementById('bt-coin').value;
  const days = parseInt(document.getElementById('bt-days').value);
  const fws = [4, 24, 72].filter(v => document.getElementById(`bt-fw${v}`).checked);
  if (!fws.length) { alert('Select at least one forward window.'); return; }

  const coins = coinVal === 'all' ? marketData.map(d => d.id) : [coinVal];
  if (!coins.length) { alert('No coins available.'); return; }

  btn.disabled = true;
  btn.textContent = 'Running…';
  document.getElementById('bt-progress-wrap').style.display = 'block';
  document.getElementById('bt-progress-fill').style.width = '0%';
  document.getElementById('bt-progress-msg').textContent = 'Starting…';
  document.getElementById('bt-content').innerHTML = '';

  try {
    const r = await fetch('/api/backtest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ coins, days, forwardWindows: fws }),
    });
    if (!r.ok) throw new Error(await r.text());

    btPollInterval = setInterval(async () => {
      try {
        const sr = await fetch('/api/backtest/status');
        const status = await sr.json();
        document.getElementById('bt-progress-fill').style.width = status.progress + '%';
        document.getElementById('bt-progress-msg').textContent = status.message;
        if (status.status === 'done') {
          clearInterval(btPollInterval); btPollInterval = null;
          document.getElementById('bt-progress-wrap').style.display = 'none';
          btn.disabled = false; btn.textContent = 'Run Backtest';
          const rr = await fetch('/api/backtest/results');
          backtestData = rr.ok ? await rr.json() : null;
          renderBacktest();
        } else if (status.status === 'error') {
          clearInterval(btPollInterval); btPollInterval = null;
          document.getElementById('bt-progress-wrap').style.display = 'none';
          btn.disabled = false; btn.textContent = 'Run Backtest';
          document.getElementById('bt-content').innerHTML =
            `<div class="loading-state" style="color:var(--red)">⚠ ${status.message}</div>`;
        }
      } catch (_) {}
    }, 1000);
  } catch (e) {
    document.getElementById('bt-progress-wrap').style.display = 'none';
    btn.disabled = false; btn.textContent = 'Run Backtest';
    document.getElementById('bt-content').innerHTML =
      `<div class="loading-state" style="color:var(--red)">⚠ ${e.message}</div>`;
  }
}

function renderBacktest() {
  const el = document.getElementById('bt-content');
  if (!backtestData) {
    el.innerHTML = '<div class="loading-state">Run a backtest to see results.</div>';
    return;
  }
  const { runAt, params, marketPhase, coinStats, simulation, benchmark } = backtestData;

  // Market phase banner
  let phaseBanner = '';
  if (marketPhase) {
    const pct = marketPhase.abovePct;
    const color = pct < 30 ? 'var(--red)' : pct < 70 ? 'var(--amber)' : 'var(--accent)';
    phaseBanner = `<div class="bt-phase-banner" style="border-color:${color};color:${color}">
      <span class="bt-phase-label">Market Phase</span>
      <span>${marketPhase.label} — BTC above EMA200 ${pct}% of test period</span>
    </div>`;
  }

  // Per-coin stats
  let coinCardsHtml = '';
  for (const [coinId, stats] of Object.entries(coinStats || {})) {
    const bw = stats.bestWindow;
    const bwCls = bw && stats.byWindowByClass?.[bw];
    const buyStats = bwCls?.buy || {};
    const sbStats  = bwCls?.strong_buy || {};
    const combined = (() => {
      const sigs = (buyStats.count || 0) + (sbStats.count || 0);
      if (!sigs) return {};
      const wins = (buyStats.wins || 0) + (sbStats.wins || 0);
      const wr = sigs ? wins / sigs : 0;
      const ag = ((buyStats.avgGain || 0) * (buyStats.count || 0) + (sbStats.avgGain || 0) * (sbStats.count || 0)) / sigs;
      const al = ((buyStats.avgLoss || 0) * (buyStats.count || 0) + (sbStats.avgLoss || 0) * (sbStats.count || 0)) / sigs;
      const rr = al > 0 ? ag / al : null;
      const ev = (wr * ag) - ((1 - wr) * al);
      return { winRate: wr, rr, ev, count: sigs };
    })();
    const wrStr = combined.winRate != null ? (combined.winRate * 100).toFixed(0) + '%' : '—';
    const evStr = combined.ev != null ? (combined.ev >= 0 ? '+' : '') + combined.ev.toFixed(2) + '%' : '—';
    const rrStr = combined.rr != null ? combined.rr.toFixed(2) : '—';
    const evClass = combined.ev >= 0 ? 'up' : 'dn';
    const ps = stats.phaseSplit;
    coinCardsHtml += `
      <div class="bt-coin-card">
        <div class="bt-coin-header">
          <span class="bt-coin-sym">${coinId}</span>
          <span class="bt-coin-window">${bw ? `best: ${bw}h` : 'n/a'}</span>
        </div>
        <div class="bt-coin-stats">
          <div class="bt-stat-item"><span class="bt-stat-label">Buy Win Rate</span><span class="bt-stat-val">${wrStr}</span></div>
          <div class="bt-stat-item"><span class="bt-stat-label">EV</span><span class="bt-stat-val ${evClass}">${evStr}</span></div>
          <div class="bt-stat-item"><span class="bt-stat-label">R/R</span><span class="bt-stat-val">${rrStr}</span></div>
          <div class="bt-stat-item"><span class="bt-stat-label">Buy Signals</span><span class="bt-stat-val">${combined.count || 0}</span></div>
        </div>
        ${ps ? `<div class="bt-phase-split">
          <span style="color:var(--accent)">Bull: ${(ps.aboveEMA200.winRate * 100).toFixed(0)}% WR (${ps.aboveEMA200.count})</span>
          <span style="color:var(--red)">Bear: ${(ps.belowEMA200.winRate * 100).toFixed(0)}% WR (${ps.belowEMA200.count})</span>
        </div>` : ''}
      </div>`;
  }

  // Simulation card
  const sim = simulation || {};
  const pl = sim.profitLoss ?? 0;
  const plClass = pl >= 0 ? 'up' : 'dn';
  const plStr = (pl >= 0 ? '+' : '') + '£' + Math.abs(pl).toFixed(2);
  const plPct = sim.profitLossPct != null ? (sim.profitLossPct >= 0 ? '+' : '') + sim.profitLossPct.toFixed(2) + '%' : '—';
  const bh = benchmark || {};
  const bhFinal = bh.finalValue || 100;
  const bhPl = bhFinal - 100;
  const bhClass = bhPl >= 0 ? 'up' : 'dn';
  const bhPlStr = (bhPl >= 0 ? '+' : '') + '£' + Math.abs(bhPl).toFixed(2);
  const bhPct = bh.returnPct != null ? (bh.returnPct >= 0 ? '+' : '') + bh.returnPct.toFixed(2) + '%' : '—';

  const simCard = `
    <div class="bt-sim-card">
      <div class="bt-sim-header">
        <span class="bt-sim-title">// £100 simulation</span>
        <span class="bt-sim-period">${params?.days || 0}d · ${params?.coins?.length || 0} coin(s)</span>
      </div>
      <div class="bt-sim-cols">
        <div class="bt-sim-col">
          <div class="bt-sim-label">Strategy</div>
          <div class="bt-sim-big ${plClass}">£${(sim.finalPot || 100).toFixed(2)}</div>
          <div class="bt-sim-sub ${plClass}">${plStr} (${plPct})</div>
        </div>
        <div class="bt-sim-col">
          <div class="bt-sim-label">Buy &amp; Hold</div>
          <div class="bt-sim-big ${bhClass}">£${bhFinal.toFixed(2)}</div>
          <div class="bt-sim-sub ${bhClass}">${bhPlStr} (${bhPct})</div>
        </div>
      </div>
      <div class="bt-sim-stats">
        <span>Trades <strong>${sim.trades || 0}</strong></span>
        <span>Wins <strong class="up">${sim.winningTrades || 0}</strong></span>
        <span>Losses <strong class="dn">${sim.losingTrades || 0}</strong></span>
        <span>Fees <strong>£${(sim.totalFees || 0).toFixed(2)}</strong></span>
        <span>Min pot <strong>£${(sim.minPot || 0).toFixed(2)}</strong></span>
        <span>Max win <strong>£${(sim.largestWin || 0).toFixed(2)}</strong></span>
      </div>
    </div>`;

  // Equity curve
  let curveHtml = '';
  const ec = sim.equityCurve;
  if (ec && ec.length >= 2) {
    const W = 828, H = 160, PAD = 6;
    const vals = ec.map(p => p.potValue);
    const minV = Math.min(...vals, 80), maxV = Math.max(...vals, 100);
    const range = maxV - minV || 1;
    const toX = (i, len) => PAD + (i / (len - 1)) * (W - PAD * 2);
    const toY = v => H - PAD - ((v - minV) / range) * (H - PAD * 2);
    const pts = ec.map((p, i) => `${toX(i, ec.length).toFixed(1)},${toY(p.potValue).toFixed(1)}`).join(' ');
    const ecFinal = ec[ec.length - 1].potValue;
    const lineColor = ecFinal >= 100 ? '#4ade80' : '#f87171';
    const base100Y = toY(100).toFixed(1);
    curveHtml = `<div class="bt-curve-wrap">
      <div class="bt-curve-title">Equity Curve</div>
      <svg class="bt-curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line x1="${PAD}" y1="${base100Y}" x2="${W - PAD}" y2="${base100Y}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2"/>
      </svg>
      <div class="bt-curve-legend"><span>£${minV.toFixed(0)}</span><span>£100</span><span>£${maxV.toFixed(0)}</span></div>
    </div>`;
  }

  const runAtStr = runAt ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">Last run: ${new Date(runAt).toLocaleString()}</div>` : '';
  el.innerHTML = runAtStr + phaseBanner + curveHtml + simCard +
    (coinCardsHtml ? `<div class="bt-coins-grid">${coinCardsHtml}</div>` : '');
}
